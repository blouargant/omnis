# Permissions contributed by the k8s-triage skill.
# These are merged into the effective ruleset when this skill is linked to an agent.

always_allow:
  - "^kubectl (get|describe|logs|top|explain) "
  - "^kubectl config (current-context|get-contexts|view)"

ask_user:
  - pattern: "^kubectl (apply|delete|patch|edit|scale|rollout|drain|cordon)"
    reason: "destructive kubectl operation"
