version: 2

project_name: yoke

before:
  hooks:
    - go mod tidy

builds:
  - id: yoke
    binary: yoke
    main: .
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    # Windows builds rely on the platform-guarded shell helpers in
    # core/tools/bash_unix.go / bash_windows.go (the Unix-only Setpgid/Kill
    # path is no longer compiled into the Windows binary).
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: yoke-server
    binary: yoke-server
    main: ./server
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    # Windows builds rely on the platform-guarded shell helpers in
    # core/tools/bash_unix.go / bash_windows.go (the Unix-only Setpgid/Kill
    # path is no longer compiled into the Windows binary).
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - yoke
      - yoke-server
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    # Windows users expect a .zip rather than a tar.gz; this is also the
    # artifact the WiX MSI pipeline unpacks to source the binaries + assets.
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - src: docs
        dst: docs
      - src: config/*.json
        dst: config
      - src: config/server.yaml
        dst: config/server.yaml
      - src: config/filters/*.json
        dst: config/filters
      - src: registry/skills
        dst: registry/skills
      - src: registry/agents
        dst: registry/agents
      - src: web
        dst: web

nfpms:
  - id: linux-packages
    package_name: yoke
    ids:
      - yoke
      - yoke-server
    file_name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    vendor: Bertrand Louargant
    homepage: https://github.com/blouargant/yoke
    maintainer: Bertrand Louargant <blouargant@chapsvision.fr>
    description: |-
      Yoke - multi-agent harness providing a CLI/TUI/REPL (yoke) and an
      HTTP API + Web UI server (yoke-server). The same binary becomes a
      code reviewer, Kubernetes triage assistant, or DBA helper purely by
      mounting different tools, skills, and MCP servers.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    priority: optional
    rpm:
      group: Applications/System

    contents:
      # Editable configuration (preserved on upgrade).
      # Config files install under /etc/yoke/ — the system layer of the
      # 3-tier search chain (.agents > $HOME/.yoke > /etc/yoke). The
      # agent/skill registries live under /etc/yoke/registry/ (see below).
      - src: config/agents.json
        dst: /etc/yoke/agents.json
        type: "config|noreplace"
        file_info:
          mode: 0644
      - src: config/models.json
        dst: /etc/yoke/models.json
        type: "config|noreplace"
        file_info:
          mode: 0644
      - src: config/mcp_config.json
        dst: /etc/yoke/mcp_config.json
        type: "config|noreplace"
        file_info:
          mode: 0644
      - src: config/permissions.json
        dst: /etc/yoke/permissions.json
        type: "config|noreplace"
        file_info:
          mode: 0644
      - src: config/preferences.json
        dst: /etc/yoke/preferences.json
        type: "config|noreplace"
        file_info:
          mode: 0644
      - src: config/remote_registries.json
        dst: /etc/yoke/remote_registries.json
        type: "config|noreplace"
        file_info:
          mode: 0644
      - src: packaging/etc-yoke/server.yaml
        dst: /etc/yoke/server.yaml
        type: "config|noreplace"
        file_info:
          mode: 0644
      - src: config/a2a_config.json
        dst: /etc/yoke/a2a_config.json
        type: "config|noreplace"
        file_info:
          mode: 0644
      - src: config/filters/*.json
        dst: /etc/yoke/filters/
        type: "config|noreplace"
        file_info:
          mode: 0644

      # Login-shell env defaults (YOKE_CONFIG_PATH, YOKE_WEB_DIR).
      - src: packaging/profile.d/yoke.sh
        dst: /etc/profile.d/yoke.sh
        file_info:
          mode: 0644

      # Bundled agent definitions, skill playbooks and Web UI assets (read-only).
      # `type: tree` preserves the directory structure under src.
      - src: registry/agents
        dst: /etc/yoke/registry/agents
        type: tree
      - src: registry/skills
        dst:  /etc/yoke/registry/skills
        type: tree
      - src: web
        dst: /usr/share/yoke/web
        type: tree

      # Mutable curator output — owned by root but world-writable so any
      # local user running `yoke` can let the curator persist soft-skills.
      - dst: /var/lib/yoke/softskills
        type: dir
        file_info:
          mode: 0777

      # Documentation.
      - src: LICENSE
        dst: /usr/share/doc/yoke/LICENSE
        file_info:
          mode: 0644
      - src: README.md
        dst: /usr/share/doc/yoke/README.md
        file_info:
          mode: 0644
      - src: docs
        dst: /usr/share/doc/yoke/docs
        type: tree

    overrides:
      rpm:
        dependencies: []
        recommends: []
      deb:
        dependencies: []
        recommends: []

brews:
  - name: yoke
    # Source the macOS/Linux archive (binaries + bundled config/web/registry).
    ids:
      - default
    repository:
      owner: blouargant
      name: homebrew-tap
      branch: main
      # PAT with write access to blouargant/homebrew-tap, exposed in CI.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/blouargant/yoke"
    description: "Multi-agent harness: CLI/TUI (yoke) + HTTP API & Web UI server (yoke-server)"
    license: "MIT"
    # Never publish a formula from rc/beta pre-release tags.
    skip_upload: auto
    install: |
      # Keep the real binaries in libexec; expose env-injecting wrappers on
      # PATH so yoke finds the bundled web assets + config without the user
      # setting anything. YOKE_SYSTEM_CONFIG_DIR relocates only the system
      # layer of the config search chain, leaving ./.agents and ~/.yoke intact.
      libexec.install "yoke", "yoke-server"
      (bin/"yoke").write_env_script libexec/"yoke",
        YOKE_WEB_DIR:           pkgshare/"web",
        YOKE_SYSTEM_CONFIG_DIR: pkgshare
      (bin/"yoke-server").write_env_script libexec/"yoke-server",
        YOKE_WEB_DIR:           pkgshare/"web",
        YOKE_SYSTEM_CONFIG_DIR: pkgshare

      # Bundled defaults, refreshed on every `brew upgrade`. User overrides
      # live in ~/.yoke (higher precedence) so upgrades never clobber them.
      pkgshare.install "web"
      pkgshare.install "registry"
      pkgshare.install Dir["config/*.json"]
      pkgshare.install "config/server.yaml"
      (pkgshare/"filters").install Dir["config/filters/*.json"]
    caveats: |
      Bundled agents, skills and the Web UI install under
        #{HOMEBREW_PREFIX}/share/yoke
      and are refreshed on every `brew upgrade`. Put your own overrides in
        ~/.yoke   (e.g. ~/.yoke/agents.json, ~/.yoke/models.json)
      which take precedence over the bundled defaults.

      Set a provider API key before first run, e.g.:
        export ANTHROPIC_API_KEY=sk-...

      Run the Web UI / HTTP API server (listens on :8080, unauthenticated by
      default — set YOKE_SERVER_TOKEN to require a bearer token):
        yoke-server
      or as a background service:
        brew services start yoke
    service: |
      run [opt_bin/"yoke-server"]
      keep_alive true
      log_path var/"log/yoke-server.log"
      error_log_path var/"log/yoke-server.log"
      working_dir var
    test: |
      system bin/"yoke", "version"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  # Stable tags (vA.B.C) publish as a normal GitHub release; rc/beta tags
  # (vA.B.C-rcN, vA.B.C-betaN) are valid semver pre-releases, so
  # `prerelease: auto` flips the GitHub pre-release flag automatically.
  draft: false
  prerelease: auto
