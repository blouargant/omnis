<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0e639c"/>
  <!-- orbit: back (top) half — drawn first so the O ring occludes it -->
  <path d="M5 32 A27 8 0 0 1 59 32" transform="rotate(20 32 32)"
        fill="none" stroke="#f5a623" stroke-width="3"/>
  <!-- the O -->
  <circle cx="32" cy="32" r="15"
          fill="none" stroke="#ffffff" stroke-width="6.5"/>
  <!-- orbit: front (bottom) half — drawn over the O -->
  <path d="M5 32 A27 8 0 0 0 59 32" transform="rotate(20 32 32)"
        fill="none" stroke="#f5a623" stroke-width="3"/>
</svg>
