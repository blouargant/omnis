# Unified runtime config for agent-toolkit.
# Precedence is: CLI flags > environment variables > this file > defaults.

skills_dir: skills
softskills_dir: softskills
app_name: agent-toolkit
mcp_config_path: config/mcp_config.yaml
permissions_config_path: config/permissions.yaml

features:
  curator_enabled: true

models:
  # Global default used for roles without an explicit override.
  default:
    provider: openai_compat
    model: test
    base_url: https://llm-gateway.ai.chapsvision.com/llm-gateway
    # api_key accepts either a literal key or an environment variable name.
    # If the value matches an existing env var name, its value is used.
    api_key: OPENAI_API_KEY

  # Optional role-specific overrides.
  # Supported first-class role keys are:
  # orchestrator, curator, reviewer, investigator, summariser
  roles: {}
