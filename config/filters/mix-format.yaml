name: "mix-format"
version: 1
description: "Condensed mix format output"

match:
  command: "mix"
  subcommand: "format"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "compact_path"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 20
  - action: "on_empty"
    message: "ok (formatted)"

on_error: "passthrough"
