name: "grep"
version: 1
description: "Condensed grep output: compacts paths and limits results"

match:
  command: "grep"

pipeline:
  - action: "strip_ansi"
  - action: "compact_path"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 50
    overflow_msg: "... more matches"

on_error: "passthrough"
