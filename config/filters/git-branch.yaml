name: "git-branch"
version: 1
description: "Condensed git branch: branch list with current highlighted"

match:
  command: "git"
  subcommand: "branch"
  exclude_flags: ["-d", "-D", "-m", "-M", "--delete", "--move", "--copy"]

pipeline:
  - action: "strip_ansi"
  - action: "keep_lines"
    pattern: "\\S"
  - action: "head"
    n: 20
    overflow_msg: "... more branches"

on_error: "passthrough"
