name: "dotnet-format"
version: 1
description: "Condensed dotnet format: formatting issues"

match:
  command: "dotnet"
  subcommand: "format"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "compact_path"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 30
  - action: "on_empty"
    message: "ok (formatted)"

on_error: "passthrough"
