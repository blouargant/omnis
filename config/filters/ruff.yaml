name: "ruff"
version: 1
description: "Condensed ruff output: lint issues by file"

match:
  command: "ruff"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "compact_path"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 50
    overflow_msg: "... more issues"
  - action: "on_empty"
    message: "ok (no issues)"

on_error: "passthrough"
