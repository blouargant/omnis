name: "yamllint"
version: 1
description: "Condensed yamllint output: issues by file"

match:
  command: "yamllint"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "compact_path"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 30
    overflow_msg: "... more issues"
  - action: "on_empty"
    message: "ok (no issues)"

on_error: "passthrough"
