name: "gh-issue"
version: 1
description: "Condensed gh issue output: issue list/view summary"

match:
  command: "gh"
  subcommand: "issue"

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 30
    overflow_msg: "... more issues"

on_error: "passthrough"
