name: "yadm"
version: 1
description: "Condensed yadm output"

match:
  command: "yadm"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "truncate_lines"
    max: 100
  - action: "head"
    n: 30

on_error: "passthrough"
