name: "docker-images"
version: 1
description: "Condensed docker images: image list"

match:
  command: "docker"
  subcommand: "images"

pipeline:
  - action: "strip_ansi"
  - action: "truncate_lines"
    max: 100
  - action: "head"
    n: 30
    overflow_msg: "... more images"

on_error: "passthrough"
