name: "mise"
version: 1
description: "Condensed mise output: tool status"

match:
  command: "mise"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 20

on_error: "passthrough"
