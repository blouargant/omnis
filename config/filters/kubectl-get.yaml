name: "kubectl-get"
version: 2
description: "Condensed kubectl output: resources with status"

match:
  command: "kubectl"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "truncate_lines"
    max: 100
  - action: "head"
    n: 30
    overflow_msg: "... more resources truncated"

on_error: "passthrough"
