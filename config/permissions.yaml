# Permission rules — the harness's safety envelope. Patterns are Go
# regexp matched against the bash command string. Lists are evaluated
# top-to-bottom: always_deny, then always_allow, then ask_user. A command
# matched by none falls through to "ask".

always_deny:
  - "rm -rf /"
  - "mkfs"
  - "dd if=.* of=/dev/"
  - ":(){.*};:"          # fork bomb
  # Reserve the soft-skills library for the curator sub-agent. The lead
  # and any non-curator code path must not write into softskills/ via the
  # generic fs tools — only the curator's `softskill_create` /
  # `softskill_update` / `softskill_index_append` tools are allowed (and
  # the curator runs in its own runner without this plugin attached).
  - pattern: '^(write|revert) .*"path":"softskills/'
    reason: "softskills/ is curator-managed; use curate_session instead"
  - pattern: '^bash .*(>|>>|tee|rm|mv|cp) .*softskills/'
    reason: "softskills/ is curator-managed; use curate_session instead"

always_allow:
  # generic read-only inspection
  - "^ls( |$)"
  - "^cat "
  - "^pwd$"
  - "^echo "
  - "^head "
  - "^tail "
  - "^grep "
  - "^find .* -name"
  # build / test loops
  - "^go (build|test|vet|fmt)"
  - "^npm (test|run build)"
  # docker read-only
  - "^docker (ps|images|logs|inspect) "

ask_user:
  - "^rm "
  - "^git push"
  - "^sudo "
  - "^docker (run|rm|rmi|exec)"
  - "^terraform (apply|destroy)"
  - "^helm (install|upgrade|uninstall)"
