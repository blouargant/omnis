# Permission rules — the harness's safety envelope. Patterns are Go
# regexp matched against the bash command string. Lists are evaluated
# top-to-bottom: always_deny, then always_allow, then ask_user. A command
# matched by none falls through to "ask".

always_deny:
  - "rm -rf /"
  - "mkfs"
  - "dd if=.* of=/dev/"
  - ":(){.*};:"          # fork bomb

always_allow:
  # generic read-only inspection
  - "^ls( |$)"
  - "^cat "
  - "^pwd$"
  - "^echo "
  - "^head "
  - "^tail "
  - "^grep "
  - "^find .* -name"
  # build / test loops
  - "^go (build|test|vet|fmt)"
  - "^npm (test|run build)"
  # kubernetes read-only
  - "^kubectl (get|describe|logs|top|explain) "
  - "^kubectl config (current-context|get-contexts|view)"
  # docker read-only
  - "^docker (ps|images|logs|inspect) "

ask_user:
  - "^rm "
  - "^git push"
  - "^sudo "
  - "^kubectl (apply|delete|patch|edit|scale|rollout|drain|cordon)"
  - "^docker (run|rm|rmi|exec)"
  - "^terraform (apply|destroy)"
  - "^helm (install|upgrade|uninstall)"
