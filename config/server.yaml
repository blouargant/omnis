# Server listen address — full host:port form, e.g. "localhost:9000".
# Leave empty to listen on all interfaces using the port below.
addr: ""

# TCP port the web UI and API listen on.
port: 8080

# Bearer token required on every /api/* request.
# Leave empty to run without authentication (not recommended in production).
token: ""

# A2A (Agent-to-Agent) protocol server.
# When enabled, a second listener starts on a2a_port.
a2a_enabled: false
a2a_port: 8090

# Directory containing the static web UI files (HTML, CSS, JS).
# Relative paths are resolved from the current working directory.
# Override with YOKE_WEB_DIR environment variable.
# web_dir: ""
